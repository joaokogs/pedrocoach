name: Validate PR issue link

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure PR body links an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const regex = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+\b/i;

            if (!regex.test(body)) {
              core.setFailed(
                "O PR precisa referenciar uma issue com algo como: Fixes #123"
              );
            }
