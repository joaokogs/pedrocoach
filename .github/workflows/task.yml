name: Enforce single dev category label

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]

permissions:
  issues: write
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');

            const categoryLabels = [
              "bug",
              "feature",
              "refactor",
              "chore",
              "docs",
              "test",
              "perf"
            ];

            const issue = context.payload.issue;
            const labels = issue.labels.map(label =>
              typeof label === "string" ? label : label.name
            );

            const matched = labels.filter(label => categoryLabels.includes(label));

            if (matched.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body:
                  "Esta issue precisa ter exatamente 1 label de categoria de desenvolvimento: `bug`, `feature`, `refactor`, `chore`, `docs`, `test` ou `perf`."
              });

              core.setFailed("Nenhuma label de categoria encontrada.");
              return;
            }

            if (matched.length > 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body:
                  `Esta issue possui mais de uma label de categoria: ${matched.join(", ")}. Mantenha apenas uma.`
              });

              core.setFailed("Mais de uma label de categoria encontrada.");
              return;
            }

            console.log(`Label válida encontrada: ${matched[0]}`);
