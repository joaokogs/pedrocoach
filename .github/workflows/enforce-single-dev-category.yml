name: Enforce single dev category label

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]

permissions:
  issues: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const categoryLabels = [
              "bug",
              "feature",
              "refactor",
              "chore",
              "docs",
              "test",
              "perf"
            ];

            const issue = context.payload.issue;

            const labels = issue.labels.map(label => label.name);

            const matched = labels.filter(label => categoryLabels.includes(label));

            console.log("Labels:", labels);
            console.log("Matched:", matched);

            if (matched.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "Precisa ter exatamente 1 label de categoria: bug, feature, refactor, chore, docs, test ou perf."
              });

              core.setFailed("Nenhuma label válida.");
              return;
            }

            if (matched.length > 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Mais de uma label encontrada: ${matched.join(", ")}`
              });

              core.setFailed("Mais de uma label.");
              return;
            }

            console.log(`OK: ${matched[0]}`);
