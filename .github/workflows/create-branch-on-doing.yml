name: Create branch when issue enters doing

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  create-branch:
    if: github.event.label.name == 'doing'
    runs-on: ubuntu-latest

    steps:
      - name: Generate branch name
        id: vars
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const rawTitle = issue.title
              .toLowerCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "")
              .slice(0, 40);

            const branch = `feature/${issue.number}-${rawTitle || "task"}`;
            core.setOutput("branch", branch);

      - name: Check if branch already exists
        id: branch_exists
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `${{ steps.vars.outputs.branch }}`;
            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch
              });
              core.setOutput("exists", "true");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
              } else {
                throw error;
              }
            }

      - name: Get main SHA
        if: steps.branch_exists.outputs.exists == 'false'
        id: main_sha
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: "main"
            });

            core.setOutput("sha", data.commit.sha);

      - name: Create branch from main
        if: steps.branch_exists.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `${{ steps.vars.outputs.branch }}`;
            const sha = `${{ steps.main_sha.outputs.sha }}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha
            });

      - name: Comment on issue with branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `${{ steps.vars.outputs.branch }}`;
            const exists = `${{ steps.branch_exists.outputs.exists }}` === "true";

            const body = exists
              ? `A branch já existe para esta issue:\n\n\`${branch}\``
              : `Branch criada com sucesso a partir da \`main\`:\n\n\`${branch}\`\n\nExemplo:\n\`\`\`bash\ngit fetch origin\ngit checkout ${branch}\n\`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
